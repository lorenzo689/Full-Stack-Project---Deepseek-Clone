server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/app}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

deepseek:
  api:
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
    key: ${DEEPSEEK_API_KEY:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    WARN: warn
